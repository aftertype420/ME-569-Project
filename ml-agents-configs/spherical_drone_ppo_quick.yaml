behaviors:
  SphericalDrone:
    trainer_type: ppo
    hyperparameters:
      batch_size: 1024
      buffer_size: 10240
      learning_rate: 3.0e-4
      beta: 5.0e-4
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear
    network_settings:
      normalize: true
      hidden_units: 256
      num_layers: 3
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
    keep_checkpoints: 3
    max_steps: 150000
    time_horizon: 128
    summary_freq: 5000

engine_settings:
  time_scale: 20
  target_frame_rate: -1
  capture_frame_rate: 60

torch_settings:
  device: cpu
